name = "2fauth-worker-app"
main = "backend/src/app/worker.ts" 
compatibility_date = "2024-04-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "mfa.sijuly.nyc.mn", custom_domain = true }
]

[assets]
binding = "ASSETS"
directory = "frontend/dist" 
not_found_handling = "single-page-application"
run_worker_first = true

[build]
command = "npm run build --prefix frontend" 

[[d1_databases]]
binding = "DB"
database_name = "2fauth-db"
database_id = "66f2900f-066c-4c9e-8738-cf862fb04727"

[triggers]
crons = ["0 2 * * *"]

[env.dev]
[[env.dev.d1_databases]]
binding = "DB"
database_name = "2fauth-db-dev"
database_id = "9e591736-5dbb-4f09-8769-0270d7257731"